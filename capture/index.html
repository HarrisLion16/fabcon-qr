<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lead Capture - FABCON 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --navy: #232F3E;
    --gold: #FCB516;
    --charcoal: #424242;
    --med-gray: #676869;
    --light-gray: #EAEAEA;
    --off-white: #F5F5F5;
    --green: #30B676;
    --light-blue: #ABCAE3;
  }

  html, body {
    height: 100%;
    font-family: Arial, sans-serif;
    background: var(--navy);
    color: var(--charcoal);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: #FFFFFF;
  }

  /* Header */
  .header {
    background: var(--navy);
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
  }

  .header-sub {
    color: var(--light-blue);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .header-back {
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .header-back:active { background: rgba(252, 181, 22, 0.15); }

  .header-accent { height: 3px; background: var(--gold); flex-shrink: 0; }

  /* Counter bar */
  .counter-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--off-white);
    border-bottom: 1px solid var(--light-gray);
    flex-shrink: 0;
  }

  .counter-text {
    font-size: 13px;
    color: var(--med-gray);
    font-weight: 600;
  }

  .counter-num {
    color: var(--navy);
    font-size: 18px;
    font-weight: 700;
  }

  .export-btn {
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    background: var(--light-gray);
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .export-btn:active { background: #d0d0d0; }

  /* Capture area */
  .capture-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--light-gray);
    flex-shrink: 0;
  }

  .capture-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #FDD04B 0%, #D4960E 100%);
    color: var(--navy);
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 14px rgba(252, 181, 22, 0.3);
  }

  .capture-btn:active { transform: scale(0.98); }

  .capture-icon { font-size: 22px; }

  /* Hidden file input */
  #cameraInput { display: none; }

  /* Form overlay */
  .form-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .form-overlay.visible { display: flex; }

  .form-card {
    background: #FFFFFF;
    border-radius: 16px;
    width: 90%;
    max-width: 400px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .form-preview {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 16px;
    background: var(--off-white);
  }

  .form-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--med-gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
  }

  .form-input {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--light-gray);
    border-radius: 8px;
    font-size: 15px;
    font-family: Arial, sans-serif;
    margin-bottom: 12px;
    -webkit-appearance: none;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .form-cancel {
    flex: 1;
    padding: 12px;
    background: var(--light-gray);
    color: var(--charcoal);
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .form-save {
    flex: 2;
    padding: 12px;
    background: var(--green);
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .form-save:disabled {
    opacity: 0.5;
  }

  .form-save:active { background: #28a065; }

  .form-status {
    text-align: center;
    font-size: 12px;
    color: var(--med-gray);
    margin-top: 8px;
  }

  /* Lead list */
  .lead-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 20px;
  }

  .lead-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--med-gray);
    font-size: 14px;
    line-height: 1.6;
  }

  .lead-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--light-gray);
    align-items: center;
  }

  .lead-thumb {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--off-white);
    flex-shrink: 0;
  }

  .lead-info {
    flex: 1;
    min-width: 0;
  }

  .lead-time {
    font-size: 11px;
    color: var(--med-gray);
    margin-bottom: 2px;
  }

  .lead-detail {
    font-size: 13px;
    color: var(--charcoal);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lead-detail-label {
    color: var(--med-gray);
    font-size: 11px;
  }

  .lead-status {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .lead-status.uploaded {
    background: rgba(48, 182, 118, 0.12);
    color: var(--green);
  }

  .lead-status.pending {
    background: rgba(252, 181, 22, 0.12);
    color: #D4960E;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Lead Capture</div>
      <div class="header-sub">FABCON Atlanta 2026</div>
    </div>
    <a href="../" class="header-back">&lt; QR App</a>
  </div>
  <div class="header-accent"></div>

  <div class="counter-bar">
    <div class="counter-text">Leads today: <span class="counter-num" id="leadCount">0</span></div>
    <button class="export-btn" id="exportBtn">Export CSV</button>
  </div>

  <div class="capture-section">
    <button class="capture-btn" id="captureBtn">
      <span class="capture-icon">&#x1F4F7;</span>
      <span>Capture Badge</span>
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
  </div>

  <div class="lead-list" id="leadList">
    <div class="lead-empty" id="emptyState">
      No leads captured yet.<br>Tap "Capture Badge" to photograph a badge.
    </div>
  </div>
</div>

<!-- Form overlay -->
<div class="form-overlay" id="formOverlay">
  <div class="form-card">
    <img class="form-preview" id="formPreview" alt="Badge preview">
    <label class="form-label">Phone (optional)</label>
    <input class="form-input" id="formPhone" type="tel" placeholder="555-123-4567" inputmode="tel">
    <label class="form-label">Email (optional)</label>
    <input class="form-input" id="formEmail" type="email" placeholder="name@company.com" inputmode="email">
    <label class="form-label">Notes (optional)</label>
    <input class="form-input" id="formNotes" type="text" placeholder="Interested in IAP, follow up Thurs...">
    <div class="form-actions">
      <button class="form-cancel" id="formCancel">Cancel</button>
      <button class="form-save" id="formSave">Save & Upload</button>
    </div>
    <div class="form-status" id="formStatus"></div>
  </div>
</div>

<script>
(function() {
  // Token from localStorage - set once via prompt, persists across sessions
  var GITHUB_TOKEN = localStorage.getItem('fabcon_gh_token') || '';
  if (!GITHUB_TOKEN) {
    GITHUB_TOKEN = prompt('Paste the GitHub upload token:') || '';
    if (GITHUB_TOKEN) localStorage.setItem('fabcon_gh_token', GITHUB_TOKEN);
  }
  var REPO = 'HarrisLion16/fabcon-qr';
  var BRANCH = 'main';

  // Local storage for lead list display
  var leads = JSON.parse(localStorage.getItem('fabcon_leads') || '[]');

  var captureBtn = document.getElementById('captureBtn');
  var cameraInput = document.getElementById('cameraInput');
  var formOverlay = document.getElementById('formOverlay');
  var formPreview = document.getElementById('formPreview');
  var formPhone = document.getElementById('formPhone');
  var formEmail = document.getElementById('formEmail');
  var formNotes = document.getElementById('formNotes');
  var formSave = document.getElementById('formSave');
  var formCancel = document.getElementById('formCancel');
  var formStatus = document.getElementById('formStatus');
  var leadList = document.getElementById('leadList');
  var leadCount = document.getElementById('leadCount');
  var emptyState = document.getElementById('emptyState');
  var exportBtn = document.getElementById('exportBtn');

  var currentImageB64 = null;

  function renderLeads() {
    leadCount.textContent = leads.length;
    emptyState.style.display = leads.length === 0 ? 'block' : 'none';

    // Remove old items
    var items = leadList.querySelectorAll('.lead-item');
    for (var i = 0; i < items.length; i++) items[i].remove();

    // Render newest first
    for (var j = leads.length - 1; j >= 0; j--) {
      var lead = leads[j];
      var div = document.createElement('div');
      div.className = 'lead-item';

      var details = '';
      if (lead.phone) details += '<div class="lead-detail"><span class="lead-detail-label">Phone:</span> ' + lead.phone + '</div>';
      if (lead.email) details += '<div class="lead-detail"><span class="lead-detail-label">Email:</span> ' + lead.email + '</div>';
      if (lead.notes) details += '<div class="lead-detail"><span class="lead-detail-label">Notes:</span> ' + lead.notes + '</div>';
      if (!details) details = '<div class="lead-detail" style="color:#999;">No contact info</div>';

      div.innerHTML =
        '<img class="lead-thumb" src="' + (lead.thumbData || '') + '" alt="Badge">' +
        '<div class="lead-info">' +
          '<div class="lead-time">' + lead.time + '</div>' +
          details +
        '</div>' +
        '<div class="lead-status ' + (lead.uploaded ? 'uploaded' : 'pending') + '">' +
          (lead.uploaded ? 'Uploaded' : 'Pending') +
        '</div>';

      leadList.appendChild(div);
    }
  }

  function saveLeads() {
    localStorage.setItem('fabcon_leads', JSON.stringify(leads));
  }

  // Compress image for thumbnail and upload
  function processImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        // Create upload version (max 1200px wide)
        var canvas = document.createElement('canvas');
        var maxW = 1200;
        var scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        var uploadData = canvas.toDataURL('image/jpeg', 0.85);

        // Create thumbnail (200px)
        var thumbCanvas = document.createElement('canvas');
        var thumbScale = Math.min(1, 200 / img.width);
        thumbCanvas.width = img.width * thumbScale;
        thumbCanvas.height = img.height * thumbScale;
        var thumbCtx = thumbCanvas.getContext('2d');
        thumbCtx.drawImage(img, 0, 0, thumbCanvas.width, thumbCanvas.height);
        var thumbData = thumbCanvas.toDataURL('image/jpeg', 0.6);

        callback(uploadData, thumbData);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Upload to GitHub
  function uploadToGitHub(filename, base64Content, callback) {
    // Strip data URL prefix
    var raw = base64Content.split(',')[1];

    var xhr = new XMLHttpRequest();
    xhr.open('PUT', 'https://api.github.com/repos/' + REPO + '/contents/captures/' + filename);
    xhr.setRequestHeader('Authorization', 'Bearer ' + GITHUB_TOKEN);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      callback(xhr.status >= 200 && xhr.status < 300);
    };
    xhr.onerror = function() { callback(false); };
    xhr.send(JSON.stringify({
      message: 'Lead capture: ' + filename,
      content: raw,
      branch: BRANCH
    }));
  }

  // Capture button
  captureBtn.addEventListener('click', function() {
    cameraInput.click();
  });

  // File selected
  cameraInput.addEventListener('change', function(e) {
    if (!e.target.files || !e.target.files[0]) return;

    processImage(e.target.files[0], function(uploadData, thumbData) {
      currentImageB64 = uploadData;
      formPreview.src = uploadData;
      formPhone.value = '';
      formEmail.value = '';
      formNotes.value = '';
      formStatus.textContent = '';
      formSave.disabled = false;
      formSave.textContent = 'Save & Upload';
      formOverlay.classList.add('visible');
    });

    // Reset input so same file can be re-selected
    e.target.value = '';
  });

  // Cancel
  formCancel.addEventListener('click', function() {
    formOverlay.classList.remove('visible');
    currentImageB64 = null;
  });

  // Save & Upload
  formSave.addEventListener('click', function() {
    if (!currentImageB64) return;
    formSave.disabled = true;
    formSave.textContent = 'Uploading...';
    formStatus.textContent = '';

    var now = new Date();
    var timestamp = now.toISOString();
    var dateStr = now.toISOString().split('T')[0];
    var timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '');
    var seq = String(leads.length + 1).padStart(3, '0');
    var baseFilename = dateStr + '_' + timeStr + '_' + seq;

    var lead = {
      id: baseFilename,
      time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      timestamp: timestamp,
      phone: formPhone.value.trim(),
      email: formEmail.value.trim(),
      notes: formNotes.value.trim(),
      thumbData: null,
      uploaded: false
    };

    // Store thumbnail for display
    var thumbCanvas = document.createElement('canvas');
    var img = new Image();
    img.onload = function() {
      var s = Math.min(1, 200 / img.width);
      thumbCanvas.width = img.width * s;
      thumbCanvas.height = img.height * s;
      thumbCanvas.getContext('2d').drawImage(img, 0, 0, thumbCanvas.width, thumbCanvas.height);
      lead.thumbData = thumbCanvas.toDataURL('image/jpeg', 0.5);

      // Upload photo
      uploadToGitHub(baseFilename + '.jpg', currentImageB64, function(photoOk) {
        if (!photoOk) {
          formStatus.textContent = 'Upload failed - saved locally';
          lead.uploaded = false;
          leads.push(lead);
          saveLeads();
          renderLeads();
          formSave.disabled = false;
          formSave.textContent = 'Save & Upload';
          setTimeout(function() { formOverlay.classList.remove('visible'); }, 1500);
          return;
        }

        // Upload metadata JSON
        var meta = {
          timestamp: timestamp,
          phone: lead.phone,
          email: lead.email,
          notes: lead.notes,
          photo: baseFilename + '.jpg'
        };

        var metaB64 = 'data:application/json;base64,' + btoa(JSON.stringify(meta, null, 2));
        uploadToGitHub(baseFilename + '.json', metaB64, function(metaOk) {
          lead.uploaded = true;
          leads.push(lead);
          saveLeads();
          renderLeads();
          formStatus.textContent = 'Uploaded successfully!';
          formSave.textContent = 'Done!';
          currentImageB64 = null;
          setTimeout(function() { formOverlay.classList.remove('visible'); }, 1000);
        });
      });
    };
    img.src = currentImageB64;
  });

  // Export CSV
  exportBtn.addEventListener('click', function() {
    if (leads.length === 0) return;

    var csv = 'Timestamp,Phone,Email,Notes,Photo,Uploaded\n';
    for (var i = 0; i < leads.length; i++) {
      var l = leads[i];
      csv += '"' + l.timestamp + '","' + (l.phone || '') + '","' + (l.email || '') + '","' +
             (l.notes || '').replace(/"/g, '""') + '","' + l.id + '.jpg","' + l.uploaded + '"\n';
    }

    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'fabcon-leads-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Init
  renderLeads();
})();
</script>
</body>
</html>
